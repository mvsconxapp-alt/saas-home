name: Deploy Portal Principal
on:
  push:
    branches: [ main ]

env:
  # Isso resolve o aviso do Node.js 24 que você recebeu
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Mantivemos a 20 por estabilidade, mas o env acima resolve o aviso

      - name: 🛠️ Build
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: 📂 Deploy FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Ajuste importante: tente usar o caminho completo se o ./ falhar
          # Exemplo: ./public_html/
          server-dir: ./
          local-dir: ./dist/
          protocol: ftp
          port: 21
          dangerous-clean-slate: false
          # Adicionamos isso para evitar erros de certificado SSL da HostGator
          security: loose
